body:
  text: 卷六産後妄言妄見産後妄言妄見由氣血兩虛而神魂無依也夫心藏神主血而言乃心之聲也心有血而神存則言不妄發又肝藏血而目乃肝之竅也目得血而司視則瞳瞭而視正若夫産後血氣暴竭則心神失守故言語無倫肝魂無依則瞳眊無見況心為一身之主目乃百脈之形虛症見於心目則十二官失其職可知矣是以視聽言動皆有虛妄專治法當論塊痛有無症候緩急若塊痛未除連服生化湯二三帖化塊定痛繼服加參生化湯或補中益氣湯加以安神定志之藥調治之若産日久形氣血氣俱虛即當大補為主使生養氣血寧神定志服至藥力充足其症可愈病家毋求速效醫者毋論邪祟若噴以法水驚以法尺多致不救屢治此症服藥至十餘帖方見效朱丹溪云病虛有似邪祟是也又云欲泄其邪先補其虛調其氣次論諸疾此古人治産後虛症及年老虛喘弱人妄言妄見症之用心也産後塊痛未除患妄言妄見寧神生化湯川芎茯神柏子仁各一錢當歸三錢薑炭炙草各四分桃仁十二粒人參二錢益智炒八分陳皮三分棗二枚産後塊痛已止患妄言妄見滋榮養氣復神湯黃耆白朮人參麥冬川芎棗仁茯神柏子仁益智炒當歸熟地各二錢炙草陳皮三分蓮子八粒五味子七粒元眼肉八個棗二個大凡産後患崩血脫短氣似喘氣脫妄言妄見神脫三症雖有血陰氣陽之分其精散神去無異比前暈症治可少緩然亦危症也若非厚藥妥方頻服失之者多矣若醫者誤論氣實痰火皆誤人也如新産有血塊痛三症並用加參生化湯此行中有補斯免滯血虛暈之失也其塊痛既止宜用升舉大補藥少佐黃連清火以治崩脫攝氣歸源也宜用滋榮益氣復神湯少佐痰藥以清心火寧君主之官也每見人妄論氣脫妄言之症誤用氣實痰火方藥屢夭人命故重復録告倘執論痰氣而致病愈重者或能試以補劑救之猶可活也毋害人以受天殃吳按治病先分虛實尤以脈為憑經云血脫有生血之機尤須補氣而氣脫亦應加入補血藥所謂陰陽互相為根不可偏重也産後傷食凡産形體勞倦脾胃俱傷是以新産之後禁膏粱遠厚味食粥茹蔬乃切務也不善調治之家唯慮産婦之虛以多食為有益以厚味為補本産婦不思而強與致饜食則有傷胃雖納受脾難轉輸食停痞塞酸噯惡食治宜保元為主溫補氣血健脾助胃審傷何物佐以消導使脾氣腹而轉輸散積則滯物行而胃始思食夫飲食脾虛之滋味在産後未嘗不藉此為補助但勞倦傷食不勝甘飫薄味漸進運化易速乃事産者不知此意業已受傷須知服生化湯佐神麯麥芽以消麵食山楂砂仁以消肉食吳茱萸肉桂以消冷物如此則補消並濟無有不安屢見治産者不重産虛人弱唯知速消傷物反損其氣益增滿悶一帖不效又加峻藥一醫無功又更一醫先後方類輕症加重致使少食之人反虛而絶不思食者十常八九病家自歸數命醫家以為盡技惜哉産後塊痛未消服下方以消食加味生化湯川芎二錢當歸五錢薑炭五分炙甘草五分桃仁十粒傷面飯加神麯麥芽炒用各一錢傷肉食加山楂砂仁各五分傷寒冷物作痛加吳茱萸肉桂五分如虛甚加人參一二錢塊痛已止服下方以消食健脾消食生化湯川芎神麯各一錢當歸人參各二錢炙草麥芽各五分白朮一錢五分傷肉食加山楂砂仁傷寒冷物加吳茱萸肉桂如停寒物日久脾胃虛弱恐藥不能運用可用炒神麯研末乘熱以綢帕包揉按胸腹間冷則尉斗尉之傷食誤服消導藥致絶粥幾日並雜症誤服消耗以致絶食者俱用長生活命丹可救如系服寒藥傷者加薑三大片長生活命丹具祕要産後忿怒凡産後因忿怒氣逆胸膈不舒血塊又痛宜用生化湯去桃仁臨服時磨木香二分入藥服之則血塊自化怒氣自散並治而不悖也若輕産重氣偏用香附烏藥枳殼香砂之類以散氣行塊則元氣反損而滿悶益增非善治産者也又如怒後即食胃弱停悶當審所傷何物於對症之藥加一二味於生化湯中無有不治慎毋用克削消積丸瀉氣之方以散氣化食否則虛弱産婦重傷元氣害不可勝言者矣木香生化湯川芎二錢當歸六錢薑炭四分木香臨服磨二分陳皮二分産後無塊痛受氣傷食服下方健脾化食散氣湯白朮二錢當歸三錢川芎一錢薑炭炙草各四分人參二錢陳皮三分如傷肉食加山楂砂仁傷飯食加神麯傷麵食加麥芽傷寒冷物脅下作痛加肉桂大抵産婦弱受氣停食愈消則愈增滿悶必攻補並行方可化滯進食但時醫所見只知消耗而疑人參為補而不敢用誤人多矣故屢治誤服散氣消導藥致使少食思食之人反絶食日久者皆用長生活命丹而活者甚多産後忿怒氣逆及産後停食二症善治者重産而輕怒治以補氣血為主佐以順氣調氣則怒郁散而元不損非徒恃用消導則停滯行而胃思谷此治産後忿怒傷食之良法也若專一理氣消食非惟氣脹不散停食不消則正氣尤減食甚至絶谷不救産後類瘧産後寒熱往來每日應期而發其症類瘧切不可用瘧疾方藥治之夫氣血虛而寒熱更作元氣弱而外邪或侵雖寒來股栗湯火不能溫熱如燔炙水冰不能寒或晝輕夜重或日晡寒熱雖所見症與瘧同其治法必當滋榮益氣以退寒熱有汗急當止汗只頭有汗不及於足此乃孤陽絶陰之症須當加當歸地黃之劑如陽明惡寒頭痛無汗宜於生化湯加羌活防風蓮鬚蔥白以散之慎不可作瘧治而用柴胡清肺飲等方至常山草果等藥更害人不可用産後寒熱有汗每午後應期而發類瘧滋榮益氣扶正湯人參熟地各二錢黃耆白朮川芎麥冬麻黃根各一錢當歸三錢陳皮四分炙甘草五分日間煎服夜間兼服六味地黃丸清湯下吳按麻黃根雖散中有收又能止汗究系猛藥不宜重用以他藥代之便妥産後寒熱往來頭痛無汗類瘧加減養胃湯冬白朮甘草藿香各四分白茯苓川芎陳皮各一錢半夏八分當歸三錢人參一錢五分薑一片如有痰加竹瀝薑汁半夏曲如質弱兼服河車丸若久瘧無汗不愈兼服參朮膏産後類傷寒二陽症産後七日內發熱頭痛惡寒毋專論為傷寒太陽症發熱頭疼脅痛毋專論為傷寒少陽症二者皆由氣血兩虛陰陽不和而類外感治者慎勿輕産後執偏門而用麻黃湯以治類太陽症又勿用柴胡湯以治類少陽症且産婦血脫之後而重發汗則虛虛之禍有不可勝言者昔仲景云亡血家不可發汗丹溪云産後切不可發表二先生非謂産婦真無傷寒之病也非謂麻黃柴胡方之不對症也誠恐後學業偏門而輕産後執成方以發表耳雖明知産後真感風寒其生化湯內芎薑亦能散之又內經云西北之氣散而發之東南之氣收而溫之所謂病同而治異也其經意謂東南人柔弱而西北之人強盛患病有異也惟産後虛勞治法不分南北概用甘溫以大補少佐散劑雖有他症以末治之又不可拘執以誤人吳按經云二陽之病發心脾乃指內傷亦有發熱惡寒不可混入外感況産後耶學者當細心講究産後發熱頭疼加味生化湯川芎一錢五分當歸三錢甘草薑炭羌活防風各四分桃仁十粒服二帖如無塊痛去桃仁若二帖後頭疼身熱不除加白芷八分細辛二分若發熱不止頭疼如破加蓮鬚蔥頭五個若虛甚加人參二三錢産後類傷寒陽明及三陰症産後潮熱有汗大便不通毋專論為傷寒陽明症口燥咽乾而渴毋專論為傷寒少陰症腹滿咽乾大便實毋專論為傷寒太陰症又汗出譫語便閉毋專論為胃中燥屎宜下此數症多由勞倦傷脾運化稽遲氣血枯竭腸腑燥涸乃虛症類實當補之症治者毋執偏門輕産後妄議三承氣湯以治類三陰症間有少壯産婦患此症而誤下幸而無妨若虛弱産婦亦復誤下多致不救者或因氣血虛脹誤下反結又有血少數日大便不通誤服攻下而泄不止者危哉吳按六經病症當查究傷寒論則表裡分明所以學者博覽群書一以貫之産後類三陰傷寒症養正通幽湯人參二錢五分當歸六錢炙草五分桃仁十五粒蓯蓉酒洗去甲麻仁炒各一錢陳皮四分如汗多便實加黃耆麻黃根人參各一錢口燥渴加麥冬人參各一錢腹滿嗌乾便實加麥冬一錢枳殼六分人參二錢汗出譫語便實乃氣血並竭精神失守宜養榮安神加茯苓棗仁遠志各一錢人參白朮各二錢黃耆柏子仁各一錢以上大便燥結症非用芎歸人參至數斤難見全效大抵産後虛中傷寒口傷寒物外症雖見頭痛發熱或脅痛腰疼是外感宜汗猶宜重産亡血禁汗仲景傷寒論亡血家禁汗禁下豈産後而可汗下乎惟宜生化湯量為加減調理方謂無失又如大便祕結猶當重産亡血禁下長沙論傷寒之不可汗不可下者非謂不當汗不當下無奈脫血後萬萬不敢耳産後大便不通潤腸粥蘇子一合去殼新米二合煮粥食潤腸即通
