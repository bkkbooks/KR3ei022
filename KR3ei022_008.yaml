body:
  text: 卷八産後霍亂産後霍亂由勞傷氣血臟腑虛損不能運化食物乃感風冷所致凡陰陽升降不順清濁亂於腸胃冷熱不調正邪相搏上吐下瀉名曰霍亂産後塊痛未除患霍亂吳按此病多發於夏秋之間若吐瀉一齊俱作為真霍亂必用附子理中湯或轉筋加木瓜緩治則無救生化六和湯川芎二錢當歸四錢乾薑甘草陳皮藿香各四分砂仁六分茯苓一錢姜三片煎服産後霍亂吐瀉手足逆冷無塊痛附子散白朮人參各一錢當歸二錢陳皮炮姜丁香甘草各四分附子五分為末粥飲調每服二錢産後霍亂吐瀉不止無塊痛溫中湯人參白朮當歸厚朴各二錢乾薑八分茯苓三錢草豆蔻一錢姜三片煎服産後嘔逆不食人之胃腑為水穀之海水穀化精以為氣血榮潤臟腑産後勞傷臟腑寒邪易乘於腸胃則氣逆嘔吐而不下食也又有瘀血未淨而嘔者亦有痰氣入胃胃口不清而嘔作醫者能隨症調治斯無失矣産後嘔逆不食加減生化湯川芎一錢五分當歸三錢炮姜炙草各五分砂仁五分淡竹葉七片薑汁二匙産後七日外患嘔逆不食溫胃丁香散當歸白朮各二錢炙姜丁香陳皮炙草各四分人參一錢前胡藿香各四分姜三片煎服産後咳逆嘔吐心忡目眩石蓮散石蓮子去谷一兩五錢茯苓一兩丁香五錢為末米飲下二錢産後口渴産婦虛弱口渴氣少由産後血少汗多內煩不生津液生津益液湯人參麥冬茯苓各二錢大棗二枚小麥竹葉各六分栝蔞根甘草各一錢如大渴不止加蘆根産後水腫産後水氣手足浮腫皮膚閒光熒色乃脾虛不能制水腎虛不能行水故也治必大補氣血為主佐以蒼朮白朮茯苓補脾如壅滿用半夏陳皮香附監之虛加人參木通有熱加麥冬黃芩以清肺金吳按按之窩而不起者氣也按之無窩隨手起者水也以此分別乃要訣耳産後七日外水腫健脾利水補中益氣湯人參二錢白朮三錢茯苓白芍各一錢陳皮五分木瓜八分紫蘇木通大腹皮蒼朮厚朴各四分如大便不通加郁李仁麻仁各一錢寒邪濕熱氣傷表無汗腫宜補氣血方中加姜皮半夏紫蘇以表汗産後風濕客傷脾經氣血凝滯以致面目虛浮四肢腫脹氣喘宜服五皮飲産後怔忡驚悸此由産中憂驚勞倦去血過多則心中躁動不寧謂之怔忡若惕惕然而驚中心怯怯如人將捕之之狀謂之驚悸治此二症惟調和脾胃補養心血使志定氣寧氣舒心安而病愈矣然在分娩後血塊未消宜服生化湯且大補以行血塊血旺則怔定驚平不必加定志安神之藥如塊痛消止後患此症宜服下方加減養榮湯川芎當歸各二錢茯神棗仁人參麥冬遠志肉黃耆白朮各一錢元眼肉八個陳皮炙草各四分如虛煩加竹茹一團痰加竹瀝薑汁産後心血不寧驚悸不安養心湯黃耆麥冬棗仁柏子仁各一錢茯神川芎遠志肉各八分當歸二錢五味十粒人參一錢五分炙草四分姜二片煎服兼服安神丸安神丸黃連酒炒生地歸身各三錢炙草五分為末蒸餅糊丸如緑豆大硃砂二錢為衣每服四十丸産後骨蒸産後骨蒸先用清骨散作湯藥服後以保真丸作湯藥服清骨散柴胡前胡黃連烏梅去核各二錢豬脊髓一條豬苦膽一個韭菜白十根各寸許上藥四味為末將髓膽韭同搗成泥入童便一盞熬稀糊入藥末搗為丸如緑豆大名清骨丸每服三四十丸清湯下如上膈熱多食後服凡男女骨蒸俱可服惟上症須作湯藥服效更速耳保真丸黃耆川芎地骨皮各六分人參白朮當歸天冬麥冬白芍枸杞知母生地各二錢茯苓黃柏炒各八分甘草五分五味十粒此丸方上症加棗三個作煎藥服骨蒸勞熱服清骨散作湯藥不應再服下方加味大造丸人參當歸山藥枸杞各一兩麥冬石斛酒蒸各八錢銀柴胡六分生地二兩胡黃連五錢黃柏酒炒七錢另將門冬地黃先搗如泥加紫河車一具如系蒸熟者亦另搗然後入諸藥末和勻搗勻為丸若焙乾河車則為末入藥搗勻蜜丸産後心痛産後心痛即胃脘疼以胃脘在心之下因傷寒氣及冷物而作痛且氣近於心故俗呼為心痛殊不知心為君主之官主血行氣統馭臟腑血氣盛則泰然安血不足則怔忡驚悸而不安心豈可痛乎若真心痛手足青黑色旦發夕死夕發旦死昔已論之詳矣治法當散胃中之寒氣消胃中之冷物必用生化湯為主而以散寒消食佐之無有不安若綿綿而痛可按而止又無塊痛在腹則當論虛而加補也其産後心痛腹痛二症因寒食與氣上攻於心則心痛下攻於腹則腹痛二症治法大約相同均當用生化湯加肉桂吳茱萸等熱藥以溫散之可也吳按心者君主之官痛則無救凡俗名心痛皆胃脘氣痛也婦女最多甚至嘔逆發厥用胡索五靈脂丹參當歸名加味拈痛散屢效加減生化湯川芎一錢當歸三錢炙姜五分肉桂吳茱萸砂仁各八分如傷食作痛可照上傷食症條加減下腹痛亦仿此産後腹痛凡産後腹痛先問血塊有無若無塊痛因遇風冷乘虛入腹作痛宜服加味生化湯若有血塊痛只服生化湯調元胡索末一錢塊痛消止産後遇風寒乘虛入腹作痛加味生化湯川芎二錢當歸四錢炙甘草炙姜各四分桂枝七分痛止減去防風七分吳茱萸六分白豆蔻五分如服之塊未消再煎一服送失笑散一錢産後小腹痛産後虛中感寒飲冷寒氣下攻則小腹作痛又有血塊作痛者亦有産後血虛臍下痛者並宜加減生化湯治之加減生化湯川芎二錢當歸三錢乾薑甘草各四分桃仁十粒有血塊痛本湯送元胡索散一錢亦治寒氣痛無血塊痛但小腹痛又可按而少止者屬血虛上方加熟地三錢元胡索散延胡索肉桂各一錢為末産後指節頭痛凡産後虛勞指節疼頭痛汗不止豬腎參耆湯人參黃耆各二錢生薑一錢淡豉一錢韭白一錢當歸三錢用豬腎二個先將腎煮熟取汁二碗煎藥八分盞溫服産後遍身痛由産後百節開張血脈流散氣弱則經絡間血多阻滯纍日不散故筋骨急引諸節不利至腰背不能轉側手足不能動履或身熱頭痛若誤作傷寒發表使汗出則筋脈動惕手足厥冷變症百出矣通痛散當歸三錢甘草三分黃耆白朮牛膝獨活肉桂各八分韭白五根姜三片産後腰痛凡婦人腎位系胞腰為腎府至産勞傷腎氣損動胞絡或虛未平復而風寒乘之二者皆至腰痛也産後感風寒腰痛不可轉側養榮壯腎湯當歸二錢獨活桂心川芎杜仲川斷各八分防風四分桑寄生二錢生薑三片兩帖後痛未止屬腎虛加熟地三錢産後日久氣虛腰疼腎弱服加味大造丸産後淋由産後氣弱熱客於脬中內虛則小便頻數熱則小便淋澀作痛名曰淋産後冷熱膏石諸淋茅根湯白茅根一兩瞿麥茯苓各五錢葵子桃膠人參各一錢五分滑石一錢紫貝二個石首魚頭四個燈心一團先將石首魚頭研末藥熟入魚首末空心服産後淋小便痛及血淋白茅湯白茅根瞿麥車前子冬葵子各二錢通草七分鯉魚齒一百個先將魚齒研末藥熟入末空心服産後小便數由脬內宿有冷氣因産發動冷氣入脬致小便數也小便數及遺尿益智散益智大者二十個為末每服二錢米湯下桑螵蛸散桑螵蛸炒三十個人參黃耆各三錢鹿茸牡蠣赤石脂各一兩為末每服二錢空心下産後流注産後惡露流於腰臂腿足關節之處或漫腫或結塊久則腫起作痛肢體倦怠治法急用蔥尉方以治外腫內服參歸生化湯以散滯血毋緩也治流注已成自潰未成自消參歸生化湯川芎一錢五分當歸三錢炙甘草五分人參二錢黃耆一錢五分肉桂四分馬蹄香二錢蔥尉法生蔥一握搗爛炙熟作餅敷腫處用厚布二三層蓋上以尉斗微火尉之流注漫腫微痛屬形氣病氣俱不足最難治若已成膿或未成膿或不潰此氣血虛也宜服人參湯如憎寒惡寒氣虛也宜十全大補湯如日晡內熱宜四物湯加人參白朮丹皮如嘔逆胃氣虛宜六君子湯加炮姜如食少體倦脾氣虛也宜補中益氣湯加倍升麻如四肢逆冷小便頻數腎氣虛也宜補中益氣湯加益智仁陰蝕五疳婦人陰戶中生瘡名曰䘌瘡或痛或癢如蟲行狀濃汁淋露陰蝕幾盡者心腎煩郁腎氣虛弱致血氣留滯經云諸痛瘡瘍皆屬於心治當補心養胃外以藥熏洗千金陰蝕散當歸川芎芍藥地榆甘草各等分用水五升煎至二升去渣熏洗日三次夜一次又方豬油十斤水一桶煮極熟以汁浸瘡冷再易熱者不過三五次可愈又方蝦蟆兔屎等分為末敷瘡亦良吳按兔屎別名望月砂為洗眼要藥
