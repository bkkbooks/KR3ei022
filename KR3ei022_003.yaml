body:
  text: 卷三子懸胎氣不和濁氣舉胎而上湊胸腹脹滿謂之子懸然必面不赤目不青者方是不然則胎壞矣紫蘇飲蘇葉八分人參大腹皮川芎白芍陳皮去白甘草各一錢當歸酒浸二錢姜三片蔥白一根空心服此症挾氣者多非紫蘇腹皮陳皮川芎無以疏其氣非當歸白芍無以利其血氣利血流而胎自下矣邪之所湊其氣必虛故用人參甘草補之一補一瀉推陳而致新也單氏子懸方人參一錢白朮當歸各二錢黃芩川芎各八分紫蘇陳皮砂仁甘草各四分如有氣加木香三分姜水煎子懸症雖以紫蘇飲主之若飲食不甘兼以四君子若內熱晡熱兼以逍遙散若胃火所致則用四君子湯加黃芩枳殼柴胡梔子若脾郁所致則用歸脾湯加柴胡枳殼子煩心中煩悶不寧者是也責之心虛有火簡易方以竹葉湯主之若左手寸脈微弱則服柏子養心丸或調補心丹臨臥服竹葉湯白茯苓二錢防風八分麥冬黃芩各一錢竹葉九片心驚膽怯煩悶不安單氏竹葉安胎散人參棗仁各一錢白朮當歸各二錢黃芩遠志各八分川芎七分懷生地一錢五分竹葉十片陳皮三分麥冬一錢甘草四分薑棗引如煩渴加竹茹一丸有痰加竹瀝薑汁虛多用人參脾常瀉減去生地麥冬棗仁夫人肺臟寒而熱乘於心則令心煩停痰積飲在心胸之間或衝於心亦令心煩若熱而煩者但熱而已若有痰飲而煩者嘔吐涎沫惡聞食氣煩躁不安也治內熱用竹葉湯痰滯用二陳湯加白朮黃芩枳殼氣滯用紫蘇飲氣鬱用分氣飲加川芎脾胃虛用六君子湯加紫蘇山梔再人足太陰脾經之氣通於口手少陰心經之氣通於舌若孕婦臟腑氣虛榮衛不理陰陽隔絶熱乘於心脾津液枯少故心煩而口乾也若系胃經實火竹葉石膏湯系胃經虛火人參黃耆散系胃經虛補中益氣湯系脾氣鬱結加味歸脾湯系肺經虛熱紫蘇飲系肝經火動加味逍遙散系腎經火動加味地黃丸吳按煩輕躁重躁為陰虛陽無所附虛陽外越孤陰失守久則暴脫經云陰虛無驟補法計在潛陽此至精微之旨也子癇孕婦痰涎壅盛阻塞或時發搐不省人事名曰子癇治宜清氣化痰為主蓋此症因於氣者多治法與癇症同惟劑稍小耳若噁心甚者煎二陳湯探吐吐定則理氣化痰兼用黃芩白朮保胎古方羚羊角散葛根湯藥味偏於辛散治者當因時制宜可也吳按癇者俗名羊顛瘋皆痰火凝聚心胞男女皆有最難除根孕婦子癇又當別論羚羊角散羚羊角一錢當歸二錢獨活五加皮茯神各八分棗仁米仁各一錢防風五分川芎杏仁各七分木香二分甘草四分如虛加人參若痰氣盛緩而人參姜引如痰多加竹瀝薑汁脾胃弱加白朮二錢五分研末服治臨月因發風疹悶憤不識人吐逆眩倒吳按疹必兼咳以咳止為毒盡總當辛涼托散使其外達而免內陷不可輕忽葛根湯葛根貝母丹皮各一錢木防己六分防風八分當歸川芎茯苓各二錢桂枝五分澤瀉甘草獨活石膏各四分人參八分水煎服忌海藻粉菜酢物孕婦無故忽然僵撲左脈微數而右脈滑大者是血虛陰火炎上鼓動其痰四物湯養血加芩連降火兼用二陳湯化痰下氣或加竹瀝薑汁子淋此症以茯苓燈心條芩為主若痰閉上焦寸關必滑宜探吐以提之然必胸膈迷悶乃可吳按不可過於通利亦不宜急用升提只用萆薢分清飲最妥日久倦怠右脈微弱屬氣虛用人參黃耆白朮麥冬茯苓加梔子知母條芩等清火藥左脈細數形羸每便則痛屬血虛用四物湯加黃柏知母條芩濟生方中治子淋症用安榮散煎麥冬湯下但滑石細辛二味稍峻人之虛實氣血各有不同達士變而通之可也安榮散方具祕要中單氏子淋方人參茯苓通草各一錢白朮當歸麥冬各二錢甘草四分燈心五分如有痰宜清肺金加黃芩七分淋閉臍腹作脹小便淋閉蓋孕婦胎繫於腎之間虛熱而成斯疾若項強筋攣語澀痰盛用羚羊角小便淋痛澀少用安榮散肝經風熱用加味逍遙散腿足轉筋而小便不利急服八味丸遲則不救服燥藥而小便頻數或不利用生地茯苓牛膝黃柏知母川芎當歸甘草煎湯頻數而黃用四物湯加黃柏知母五味麥冬元參肺氣虛而短少用補中益氣湯加山藥麥冬陰挺痿痹而頻數用地黃丸熱結膀胱而不利用五苓散脾肺燥不能小便用生黃芩清肺熱膀胱陽虛陰無所化用腎氣丸膀胱陰虛陽無所生用滋腎丸滋腎丸肉桂一兩五錢黃柏三兩知母二兩共研末為丸溺血形體勞苦或過食炒炙等物小便中帶血宜清膀胱吳按小水帶血頻數而痛為血淋小水清長帶血不痛為虛火加味逍遙散當歸二錢白芍柴胡各一錢茯苓丹皮山梔各七分白朮一錢五分炙草四分遺尿孕婦遺尿有虛與熱之分醫者當審其因如系脬中有熱用加味逍遙散系脾肺氣虛用補中益氣湯加益智系肝腎陰虛宜六味丸如孕遺尿白薇散白薇白芍等分為末米飲送下空心服遺尿不知而出桑螵蛸散桑螵蛸七個炒黃研為細末空心米飲下二錢轉胞孕婦六個月以後覺胎墜一邊小水不通其症有因火有氣虛有痰滯有血虛兩寸脈弦急或兩尺弦急有力兼口乾心煩等火症者屬熱宜用冬葵子滑石梔子木通條芩白朮以清之外以冬葵子滑石梔子為末以田螺研成膏或生蔥搗膏貼臍上立通吳按譬如水壺若貯水太滿則傾之不出去其上蓋其嘴即通亦此理也右三部微弱無力或氣口虛大兼倦怠不食者屬氣虛以補中益氣湯服下探吐以提其氣左脈不足或澀而數兼夜熱心煩或大腸閉者屬血虛宜四物湯加黃芩知母黃柏調益元散服益元散滑石六錢生甘草一錢共為末加入前藥服吳按此係六一散而益元散尚有硃砂也肥盛婦人右寸脈沉滑症兼噁心心脹小水不利屬痰滯以二陳湯加青皮升麻柴胡煎服探吐使藥汁與痰同出然後用參耆大補之大抵有孕小水不利月分淺者當清之兼保胎月分多而虛者當補之兼升提治分兩途丹溪云轉胞之症胎婦之稟賦弱者憂悶多食厚味者庸有之法用四物二陳四君子湯去茯苓煎服探吐上竅通下竅自利此症匯載甚詳須當合看陸氏謂轉胞系脾氣下陷塞住胞戶以致小水不利非熱閉之故宜用二陳湯加芎歸參術煎服探吐如不通再服再探吐以小水已利為度然後用上藥加升麻十餘帖如倦怠乏力則服補中益氣湯兼六味丸若急切無丸以丸藥料合補中益氣湯煎服若見效六味丸宜日服三次每見治此症服利小便或通大便藥以致胎墮而殞婦命者豈不惜哉吳按升麻可暫用以升提不可多服而受害單氏云轉胞由脾胃氣虛以致胎壓尿胞單氏轉胞方白朮生地各一錢五分陳皮去白甘草柴胡升麻各四分人參半夏各一錢川芎八分當歸二錢姜一片一方白蘿蔔子炒香白湯吞下立通一法空心屢飲鹽湯探吐則氣上升使下通行亦一治法中風孕婦口噤項強手足縮攣言語謇澀痰涎壅盛不省人事可作中風治用羚羊角散若無痰言語如常但見似中風症多是血燥類風切不可以風治誤人性命有毒藥傷胎狀類中風牙關緊閉口不能言兩手強直握拳頭低自汗身微熱其脈浮而軟若作中風治必死宜用白扁豆二兩生去皮為末取新汲水調下立愈中風症中腑者多著四肢脈浮惡寒拘急不仁宜汗之中臟者多著七竅唇緩失音耳聾鼻塞宜下之表裡皆和宜治在經以大藥養之而佐以安胎吳按中風有真類之分中臟者多不治若中腑血脈經絡為真中而中皮毛偏枯為類中肥人居多又有瘦人血虛火燥木旺生風為內風虛風尤難調理更有遍身關節走痛為歷節風蓋風為百病之長變態最多當尋源施治況胎産遇此危症尤當立方周到庶可保全母子性命也孕婦中風防風散防風葛根各二錢桑寄生羚羊角各三錢細辛四分當歸三錢菊花一錢五分漢防己錢半秦艽錢半桂心六分茯神三錢甘草一錢和勻每服八錢加姜五片煎好入竹瀝半合溫服吳按以硃砂雄黃末酒沖服外以艾灸手足大指尖上中惡孕婦忽然心腹刺急絞痛如鬼擊之狀不可按摩悶絶欲死或衄或吐血以調補正氣為主治用金銀藤煎湯飲神效或用熟艾拳大一丸煮汁頻服中惡心腹疼痛當歸散當歸川芎各二兩丁香六錢青皮一兩吳茱萸五錢用桔梗湯泡炒黑共和勻為末溫酒調每服五錢木香散生地二錢枳殼木香各七錢五分和勻為末溫酒下三錢苦梗散苦梗一兩炒生薑五錢水煎服又方男子汗衣燒灰存性百沸湯調服一法用鹽水探吐或用灶心土為末井水調服二錢瘈心主脈屬火肝主筋屬氣氣火相熾則為瘈治法平脈降火兼養氣血用鉤藤湯加柴胡山梔黃芩白朮若風痰上湧加竹瀝南星半夏如風邪急搐加全蠍殭蠶若虧損氣血宜八珍湯加鉤藤山梔若無力抽搐角弓反張汗出如珠等症此肝經絶也不治吳按瘈者即剛柔二痙如類中風乃傷寒之變症也鉤藤湯鉤藤當歸茯苓人參各一錢桔梗桑寄生各五分水煎服忌豬肉炒煎若煩熱加石膏一錢五分臨産加桂心四發眩暈肝熱上攻太陽穴胸膈涎壅頭旋目眩暈或腮項腫核吳按兩腮腫核為痄腮以靛花柿油調塗即消柿油乃補傘人所用消風散煅石膏防風羌活甘菊川芎羚羊角當歸白芷荊芥穗大頭黃芩各一錢炙甘草芽茶各五分水煎食遠服治諸風熱困倦時發昏眩犀角散犀角揀參各錢半山梔仁羌活黃連青黛各八分川芎茯苓白芷甘草各一錢生薑三片研食遠服三錢
