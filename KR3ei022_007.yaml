body:
  text: 卷七産後類中風産後血氣暴虛百骸少血濡養率爾口噤牙緊手足筋脈攣搐症類中風類痙癇脈雖虛大虛火泛上有痰皆當以末治之毋執偏門而用治風消痰之方以重虛産婦治法先當服生化湯以生旺新血如見危症三帖後加參益氣以救血脫也如有痰有火少佐橘紅炒黃芩之劑竹瀝薑汁亦可切忌黃連黃柏並用産後血少口噤項強筋搐類中風滋榮活絡湯川芎一錢五分當歸三錢熟地人參各二錢甘草陳皮羌活各四分黃耆茯神天麻麥冬各一錢荊芥防風各四分黃連薑汁炒八分有痰加半夏曲竹瀝薑汁渴加麥冬葛根産後中風恍惚語澀四肢不利天麻丸天麻防風各五錢茯神棗仁人參遠志山藥柏子仁門冬各一錢川芎羌活各七錢細辛四錢南星曲半夏曲石菖蒲各八錢當歸二兩共為末蜜丸硃砂為衣清湯每服六七十丸産後汗凡分娩時汗出由勞傷脾驚傷心恐傷肝也內經云搖體勞苦汗出於脾驚而奪精汗出於心有所恐懼汗出於肝産婦多兼此三者而汗出不須即加斂汗之劑能寧神而汗自止若血塊作痛耆朮未可遽加宜服生化湯二三帖以消痛隨服加參生化湯以止虛汗若分娩後倦甚濈濈然汗出形色又脫此亡陽脫汗也又當縱權速灌加參生化湯倍用人參以救危急毋拘塊痛夫汗乃心之液榮於內為血發於外為汗值産婦亡血之後又多汗由勞驚恐懼所傷神虛而不能鎮守其液也治當健脾而斂水液之精歸脾益榮衛以噓血歸源灌溉四肢不使其妄行而為外汗在雜症雖有自汗盜汗之分其當歸六黃湯不可以治産後之自汗並宜服加參生化湯又加味補中益氣湯若服參耆而汗不止及頭出汗而不至腰足乃危惡之症必難療産後虛汗不止麻黃根湯人參當歸各二錢黃耆一錢五分白朮麻黃根牡蠣各一錢桂枝炙甘草各五分浮小麥一撮如虛脫汗多手足冷加熟附子一片薑棗四分渴加麥冬五味子各六分肥白人産後多汗加竹瀝薑汁以清痰火若惡風寒加防風五分血塊不痛加熟地三錢暮服八味丸六味加五味子炙黃耆凡産後汗不止由産亡陰血而陽氣偏盛故也內經云陽加於陰則發汗因而遇風變為瘛瘲者有之矣其治尤難是以産後多汗之家更宜謹避風寒也産後盜汗産後睡夢中汗多醒來即止猶盜瞰人睡而出盜謂之盜汗此非自汗之比在雜症論云自汗陽虧盜汗陰虧然當歸六黃湯又非産後盜汗方也治當兼血分藥品調理之乃稱善耳止汗散人參二錢當歸三錢熟地一錢五分麻黃根黃連酒炒各五分浮小麥一大撮又方牡蠣煅研五分小麥面炒黃研産後口渴或兼小便不利凡産後口燥咽乾而渴或兼小便不利由産時失血或汗多所致是無水也夫水穀入胃脾肺散精清氣為津液其氣通心受火色變為血下行膀胱為小便值産亡血而又汗多且勞倦傷脾不能為胃行其津液生化之氣不運滲泄之令不行是以上無津液而有嗌乾燥渴之症下氣不升而有胃腎閉關之候治法必當助脾益肺升舉氣血則氣化流行陽升陰降水入經而為血為液谷入胃而氣長脈行自然津液充而便利調矣若認咽乾口燥為火而用芩連梔柏以降之認小便閉澀為水滯而用五苓散以通之皆非也必因其勞損而溫之益之因其渴燥而濡之行之量度病情而施治無失也生津止渴益水散人參麥冬生地當歸各三錢五味十粒黃耆一錢五分茯苓八分甘草升麻各四分葛根一錢汗多加浮麥麻黃根棗仁各一錢如渴甚加生脈散代茶不可疑而不用産後遺尿凡産後遺尿由氣血大虛不能約束宜用八珍湯加升麻柴胡甚者加熟附子一片吳按曾有接生者以手入內探扶小兒損傷尿胞以致終身滲漏可不慎哉又有生理不順誤損尿胞膀胱者用參耆為君歸芎為臣桃仁茯苓陳皮為佐以豬羊尿胞煎湯煎藥須百服漸安薛氏補脬飲黃絲絹一尺碎剪白牡丹根皮為末白芨末各一錢水煎至絹爛如飴服之靜臥不可作聲如作聲則不效産後類痙産後汗出多而變痙症口噤不開背強而直身反氣息如絶宜速服下方加減生化湯川芎麻黃根各一錢當歸四錢桂枝防風甘草羌活各五分人參二錢附子一片羚羊角天麻各八分産後中風無汗類痙芎歸活風湯川芎當歸各三錢防風羌活各五分棗仁一錢産後泄瀉産後泄瀉非雜症有食泄洞泄濡泄濕泄各如注下之論大率屬氣虛食積與濕也氣虛宜補食積宜消濕則宜燥然惡露未淨遽難驟補驟消驟燥當先服生化湯二三帖以化舊生新內加茯苓以利水道俟血化生然後補氣消食燥濕以分水道始無澀滯虛虛之失若産經旬日外方論雜症猶量人虛實而施治也如痛下清水腹鳴米飲不化者以寒泄治如糞黃色赤色肛門作痛以熱泄治有因飲食過多傷脾成瀉噫氣臭如敗卵者以食積泄治又有脾氣久虛少食食下腸鳴腹急盡下所食之物方寬快者以虛寒泄治治法寒則溫之熱則清之脾傷食積分利健脾兼消補虛方謂善於調治而可無失也産後虛泄眼昏不識人弱甚形脫必用下方丹溪回生方即附子理中湯白朮茯苓各二錢人參三錢附子一錢産後血塊未消患瀉健脾利水生化湯川芎茯苓各二錢當歸四錢薑炭炙甘草各五分桃仁十粒蓮子八粒産後血塊已消患瀉加減生化湯産後完穀不化産後完穀不化由勞倦傷脾而輸化稽遲也內經曰飲食入胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸於膀胱精氣四布五經並行是脾主為胃行其精液者也今産後勞倦傷脾失輸轉之職致清和之氣不能化而令完物出焉名曰飧泄又有飲食太過腸胃受傷亦致完穀不化俗呼為水穀痢也然産方三日內血塊未消患此脾衰胃弱之症未可遽加參耆白朮且服生化湯加益智香砂少溫胃氣候塊消散可加參耆白朮以補氣肉果木香砂仁益智以溫胃柴胡升麻以升胃中清氣澤瀉茯苓陳皮以利水此上策焉産後三日內完穀不化血塊未消加味生化湯川芎益智各一錢當歸四錢炙甘草薑炭各五分桃仁十二粒茯苓一錢五分産後三日外血塊已消完穀不化此胎前素弱故患此症參耆生化湯川芎茯苓白芍智各一錢當歸人參白朮各二錢炙甘草炙薑各五分蓮子八粒肉果一個制如瀉水多加澤瀉木通各一錢腹痛加砂仁八分渴加五味麥冬各七分寒瀉加乾薑一錢木香四分産後瀉痢日久胃氣虛弱完穀不化宜溫補助胃氣用六君子湯加木香四分肉果一個制産後痢産後七日內外患赤白痢後重腹痛前集祕要載治法此集不再入所遺方一症四茲補附焉産痢無後重但日久不止宜六君子湯加木香肉果産後赤白痢臍下痛宜用當歸厚朴黃連肉果甘草桃仁川芎煎服産後痢久色白屬血氣宜四物湯加荊芥人參痢久而形色羸白故屬血虛産後痢形體羸困心腹絞痛宜用薤白石榴皮當歸黃連地榆煎服如腹痛不止用溫湯布蘸暖腹則緩噤口痢香蓮丸黃連為末蓮肉研粉各半和勻或酒丸或酒調送每服四錢吳按古香連丸乃黃連木香與此不同附産後積滯産後滯下積滯雖腹痛至極不可用大黃等藥下之致傷胃氣遂不可救宜服下方補血消滯湯人參芍藥當歸各二錢紅曲一錢升麻四分益母草二錢加炙甘草一錢滑石二三錢足矣若惡露未淨兼用乳香沒藥各二錢五分砂仁末一錢血虛加阿膠蛤粉炒二錢久之自愈
