body:
  text: 卷二惡阻懷孕三月噁心而阻隔飲食是也亦有六七個月尚病嘔者治同然肥人責之痰瘦人責之火俱宜二陳湯加白朮黃芩或加香附砂仁薑汁竹茹與吐家同如或因氣者脈必沉治兼舒郁加撫芎香附不可過用辛藥妊娠稟受怯弱便有阻病狀如病酒顏色如故脈息和順但覺肢體沉重頭目昏眩擇食惡食好酸鹹物若甚者則作寒熱心下憤悶嘔吐痰水恍惚不支古名惡阻治先脾胃而清火化痰如吐甚者愈止愈吐仲景云停藥月餘自安孕婦飲食失宜停滯作嘔宜和平消導不可作惡阻治如脾胃弱者加人參白朮治惡阻必用大半夏湯加減如頭眩痰多加旋覆花有火加薑汁炒黃連竹茹大半夏湯半夏陳皮茯苓各二錢五分生薑一錢水煎服日久津液損胃燥乾噦不納湯水用二陳湯合四物湯加竹瀝薑汁潤以降之此症右脈必弦數左脈必微弱昧者謂半夏犯胎地黃膩膈乃知常而不達變也吐多脈弱體倦不納穀用六君子湯加麥糵生薑左脈弦急心下脹悶噁心不止者挾肝氣上衝也宜茯苓湯下抑青丸抑青丸黃連一兩為末丸如麻子大每服白湯下二三十丸左脈弱而嘔當服理血歸脾藥蓋以無陰而作嘔也脅脹或寒熱往來面色青黃此木剋土也宜六君子湯加柴胡桔梗枳殼兼腰痛胎欲墮宜二陳湯合四物湯加白朮黃耆黃芩阿膠如脹悶加縮砂仁吐而心煩用竹茹麥冬前胡橘紅蘆根煎湯徐服因食冷物及涼藥吐不止以丁香炮薑加半夏湯溫之惡阻漸退則徐服後方歸芩參附湯當歸三錢五分川芎一錢七分茯苓人參生地香附子各二錢白朮一錢五分黃芩七分麥冬一錢五分薑棗引吐雖定每食粥則口酸此肝火盛宜用川芎陳皮梔子炒茯苓生薑煎湯下抑青丸吐定之後須用大補宜人參白朮當歸黃耆陳皮茯苓煎服如有火加條芩腰痛加杜仲川斷每日一服暈眩倦怠單耆參橘飲人參一錢橘紅藿香甘草各四分白朮當歸各二錢半夏八分砂仁三分竹茹四分如肥人加竹瀝半匙仲仁治惡阻方人參陳皮竹茹各一錢麥冬木瓜各三錢藿香五分枇杷葉三大片無則蘆根代之一法妊娠惡食以所思食任意食之必愈胎痛孕婦腹中不時作痛或小腹重墜名曰胎痛宜地黃當歸湯主之如不應加人參白朮陳皮如因血氣加砂仁因中氣虛下墜而作痛則服補中益氣湯地黃當歸湯熟地三錢當歸一錢煎服腹作痛升動先將砂仁二錢炒研末白湯調服即時痛止或入前方煎服其效如神胎漏壯實婦人兩手脈平和飲食如故都無所苦而經暗下此血氣旺養胎之餘血也兒大能飲自不來矣不必治然亦不可使之多下當和血涼血健脾為主用佛手散加黃耆白朮如不已加阿膠去血多用八珍湯加膠艾一説壯盛婦胎漏腰腿不痠痛過於小心只服安胎飲孕婦經水蓄於胎若下漏則本於氣衰而不能循於經也胎干則子損矣若因熱用逍遙散因肝火用柴胡山梔散因脾火用加味歸脾湯因脾氣虛不能攝血用補中益氣湯胎漏有母因宿疾子臟為風冷所乘血氣失度使胎不安而下血者有榮經風勝經血喜動而時下者此二症若作漏胎治胎必墮若以一藥治風可止即不治風亦無害又有衝任脈虛不能制經血則月水時下若不早治使血盡則人斃矣更有氣血虛血熱風熱肝火脾火脾胃虛陷濕熱鬱怒等而致治者宜詳察之大怒傷肝而動血者宜用佛手散加梔子炒白芍蓋以佛手散胎動能安胎損能下也胎漏經血妄行淋漓不已桑寄生散當歸酒炒桑寄生川斷白朮香附醋炙阿膠蛤粉炒川芎人參白茯苓各一錢甘草五分炙薑一片煎服桑寄生安胎妙品若他樹寄生有毒不用胎漏下血陸氏胎漏方當歸川芎各二錢人參七分白朮一錢五分茯苓一錢黃耆五錢炙升麻五分香附三錢加薑棗引若胎不轉動去白朮加蘇梗五分二黃散生地熟地各等分為末煎白朮枳殼湯食前服每服二錢跌撲傷胎胎為跌撲所傷以逐汙生新為主服佛手散神效如腹動加益母子服下痛止母子俱安若胎已損則汙血頻下再加香附童便制益母草陳皮煎濃汁服系從高墜下腹痛下血煩悶加生地黃耆補以安之若腹內大痛下血加人參白朮茯苓炙甘草陳皮砂仁研服痛甚加五靈脂一錢搐犯胎不安腰腹痛或下漿水血水或上搶心氣促用四物湯加阿膠黃耆棗薑引損傷胎腰腹痛經血淋漓胎下墜陸氏傷胎方當歸三錢川芎香附黃芩各二錢升麻一錢砂仁一錢五分薑三片棗二個單氏治傷胎腹痛先服安胎散日二帖如不止再服膠艾安胎飲膠艾安胎飲人參條芩阿膠蛤粉炒熟地各一錢白朮當歸各二錢川芎八分紫蘇陳皮甘草各四分艾葉八片加薑棗引如感寒頭痛加連須蔥頭四個腹痛減去艾葉加帶殼砂仁四分胎偶有所傷動痛不可忍救急方縮砂連殼炒黑為末熱酒調服二錢或米飲亦可服後腹中覺熱胎即安屢試驗毒藥傷胎誤服毒藥傷胎欲墮甘豆竹葉湯甘草黑豆淡竹葉各等分煎濃汁服服毒藥草藥下血胎動奪命丹並治小産子死腹中丹皮茯苓桂枝桃仁赤芍各等分為末丸淡醋湯嚼下胎動下血而腹重胎動此胎欲墮也治宜行氣安胎急服佛手散加砂仁如脈大有火加黃芩白朮腹痛下黃汁加黃耆川芎各一兩糯米一合水一升煮至半升服孕婦脈弦急憎寒壯熱唇爪俱青面黃黑色是胎氣損也當問胎動否若不動反覺上攻搶心悶絶或下血當作死胎治之滿悶有外感風寒內傷飲食者用藿香正氣散有食傷脾胃者用六君子湯有陽氣壅滯者用紫蘇飲又有常多怒氣胸腹滿悶服順氣藥而甚者宜參歸芩術湯參歸芩術湯當歸人參各二錢川芎黃芩各八分白朮二錢甘草紫蘇陳皮各四分木香二分心腹脹滿氣衝心膈煩悶並腹脹滿兩脅妨悶不下飲食四肢無力倉公下氣湯羌活赤芍赤苓甘草半夏檳榔各八分桂心四分蘇梗六分青皮陳皮大腹皮桑白皮各一錢和勻每服三錢薑三片棗一個煎服心腹脹滿氣衝心膈煩悶四肢無力不思飲食訶黎勒散訶黎勒赤苓前胡各一錢陳皮大腹皮桑白皮各七分枳殼川芎白朮各五分研末每服四錢薑棗引孕六七月時脈弦發熱其胎愈脹腹痛惡寒小腹如扇此子臟虛寒也附子湯附子八分人參白朮茯苓各一錢芍藥一錢水煎服子腫面目虛浮四肢作腫如水此皆脾虛不運清濁不分所致以補脾分利為主當多用參朮單氏云或水瀉所致當服全生白朮散全生白朮散陳皮白朮薑皮大腹皮茯苓皮各五分如大便不實加澤瀉山藥扁豆秦艽有火加子芩為末每服米湯下二錢胎水尋常脾虛腫滿五皮飲大腹皮桑皮茯苓皮陳皮薑皮各等分加木香濃煎汁半盞服吳按或有以五加易桑皮者亦妥妊娠腹大胎間有水氣三因鯉魚湯白朮五兩茯苓四兩當歸川芎各二兩銼片以鯉魚一尾洗淨煮汁將藥和勻每服四錢用魚汁盞半薑三片陳皮少許煎藥空心服治子腫單氏全生白朮散白朮當歸各二錢人參一錢川芎八分甘草三分陳皮四分大腹皮茯苓皮各七分研末服大約胸腹脹小水不通遍身浮腫宜三因鯉魚湯若虛弱以四君子湯治面目虛浮肢體如水氣宜全生白朮散如不應用六君子湯治脾胃虛濕熱下部作腫宜補中益氣湯加茯苓治腿足腫喘悶或指縫出水宜天仙藤散治脾肺氣滯宜加味歸脾湯佐以加味逍遙散治脾氣虛宜補中益氣湯子氣懷胎三月以後兩足浮腫行步艱難食不甘味且喘狀如水氣名曰子氣古方一主於濕大率浮腫因脾虛者多若喘則因肺腎蓋以脾主四肢脾氣虛弱不能制水而發腫肺腎少母氣滋賴則氣促滿悶治宜補兼分利與子腫互考日腫夜消如血虛更健脾兼養其血用川芎當歸茯苓白朮白芍陳皮秦艽如心下脹是濁氣礙於上焦加厚朴貝母香附前胡大腹皮蘇葉等一二味若喘加杏仁甚者加炒蘇子按此症始自兩足漸至喘悶似水足趾出水謂之子氣乃婦人素有風氣或衝任有血風不可作水妄投湯藥當以天仙藤散主之天仙藤散天仙藤即青木香洗略炒香附炒陳皮甘草烏藥各等分和勻為末每服三錢薑三片蘇葉三片木瓜三片同煎空心服三服後腫消此方單氏作煎湯加紫蘇四分如虛加人參白朮當歸如不效兼服補中健脾之藥吳按以後三味另煎水送前藥末
