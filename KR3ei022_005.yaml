body:
  text: 卷五有孕婦家預知修合益母丸催生丸散鹿角灰大料參歸湯生化湯臨産須知痛陳未緊交骨未開雖胞水來不可臨盆若胞水來久交骨猶未開宜服大料參歸湯並補助氣血飲食産戶開兒頭未正不可服催生丸散服催生藥不可用敗血耗氣香竄等劑兒下胞停不可臥倒宜頻服生化湯胞下後不可令寒氣入腹更緊防賊風入産戶産畢將燒紅稱錘入醋瓶以瓶嘴向産母鼻孔熏之可免血暈並解穢氣産後月內宜戒怒氣勿受驚恐勿勞神力謹慎飲食論産後調護婦人病倍男子以胎産之症偏多也在胎前雖宜慎謹然時日尚寬苟非危急症猶可漸漸挽回且不至終身受纍若夫産後少有不謹或醫治失宜禍同反掌即幸不至損命目前受苦非小終身得病恆多故特列章首普告産婦並事産者鄭重自持庶幾彼此不至後悔也論治血塊産後血塊産科所當首重毋視為輕症而忽之蓋因孕成余血若産婦壯旺而産易則兒下後亦隨而俱下必不至久停作痛多由産母送兒送胞勞倦之甚或調護失宜或腹缺溫暖所致若不加意調理變症百出論治此症在古方偏用蘇木稜術以迅攻之在時俗多用生地紅花以急行之或用蘇木牛膝以大破之此三者重虛産婦非徒無益並致産後危急大症無異操刀殺人蓋産後血塊雖宜消新血亦宜生必須行中帶補化中有生者方稱善治是則生化湯一方能使塊消而痛止神清而氣復實新産之至寶也即世用山楂砂糖消塊姜椒艾酒定痛亦能致淋崩昏暈等症皆非良劑又如氣脹用烏藥香附以順之枳殼厚朴以舒之甚有用青皮枳實蘇子以下氣定喘芩連梔柏以退熱除煩若夫血枯便實反用承氣湯下之而愈結汗多小便澀短反用五苓散通之而愈祕此則更無足論蓋産後諸症總以生化湯為君其餘不過隨症加減治産後者慎毋執偏門遵古方豫於此條下分症立方可考而用也産後血暈分娩後眼見黑花頭眩昏暈不知人事謂之血暈其因有三一由勞倦甚而氣竭神昏二由血大脫而氣絶暈厥三由痰火乘虛泛上而神氣不清此三者皆魂不隨神往來而機運幾息也醫者若偏信古方認暈為惡血搶心而輕用散血之劑或偏認為痰火而無補專一消降之方此誤人之命者也當急服大料生化湯先行塊定痛如實系形色脫或汗多而暈脫皆急服生化湯一帖後即加人參二三錢如系勞倦甚而暈及血崩氣脫而暈並連灌兩帖後加人參二三錢斷不可疑參為補而緩用如或真系痰火乘虛泛上而暈可於生化湯內加橘紅四分若虛甚亦加人參如系肥人多痰再加竹瀝七分生薑汁少許以上三等暈症並不可用破血等方如塊痛甚將藥煎送益母丸或鹿角灰或元胡散或獨行散産後形色脫暈或汗多脫暈加參生化湯川芎當歸各四錢薑炭炙甘草各四分桃仁十粒人參三錢荊芥四分棗一枚煎服如脈脫形脫將絶之症可加人參三四錢頻灌救汗多亦然若無汗不脫只服大料生化湯不必加參如左手足脈脫亦系危症必須加參如血塊痛甚加肉桂七分渴加麥冬一錢五味子十粒汗多加麻黃根一錢如塊不痛可參耆並用以止汗凡治産後諸危急症必一日一夜頻服三四帖方可扶危變吉否則若照常則不及矣産後厥産時用力過多勞倦傷脾經曰脾中臟也脾乃中臟不能注於四旁四旁心肝肺腎也故逆厥而氣上行經曰厥氣上行滿脈去形經云陽氣衰於上則為寒厥神氣浮越去身而將散非大補不能回陽而復神豈數錢芎歸而能扶救將絶之氣血耶必用加參生化湯倍人參連服二三帖則氣血旺而神氣生厥自止矣若服藥反渴另用多參生脈散代茶以助救臟燥此經驗之確論毋得有議如四肢逆冷泄痢類傷寒陰症又難用四逆湯則用人參生化湯加附子一片以回陽止逆又可行參歸之功下立二方分先後用新産後發厥塊痛未止不用耆朮方加參生化湯川芎人參各二錢當歸四錢炙草五分薑炭四分桃仁十二粒棗二枚連服二帖産後發厥塊痛已除方滋榮益氣復神湯人參當歸各三錢黃耆白朮麥冬川芎各一錢炙草陳皮各四分五味子十粒熟地二錢附子五分如汗多加麻黃根棗仁各一錢大便不通加肉蓯蓉二錢大抵産後暈厥二症相類皆由氣血並竭神將去而機運幾息僅有一絲之生意耳若非重方急服豈能挽回將絶之元神耶但暈在臨盆症急雖甚於厥然能頻灌生化湯幾帖先補血分之虧即時塊化血旺而神清暈止産婦精神復矣若夫汗多氣促形脫症見則參耆必須加也至厥在分娩之後氣血兩竭宜用倍參生化湯並補氣血之虧止厥以復神又非偏補血分之可愈也要之暈有塊痛耆術未可遂加厥無塊痛耆朮地黃並用無疑也産後血崩産後血大來當審血之紅紫神形色之虛實如血紫有塊乃當去之敗血止留反作痛不可論崩如鮮紅之血大來乃是驚傷心不能主血怒傷肝不能藏血勞傷脾不能統血歸經耳當以崩治先宜頻服生化湯幾帖則行中有補血寧生旺矣若形脫或多汗氣促宜服倍參生化湯以益氣斯陽生而陰長矣此非棕灰等之可止者再如産已半月外患崩又宜升舉大補湯治之分娩後血崩生血止崩湯川芎一錢當歸去尾四錢薑炭四分炙甘草荊芥烏梅煅灰蒲黃炒各五分桃仁十粒棗二枚煎服忌姜椒熱物並生冷如鮮血大來加白芷五分血竭形脫並汗多氣促俱加人參三四錢若無汗不脫不促只服生化湯多幾帖則血自寧世有言芎歸但能活血不可治崩此誤人之論塊痛已除血崩滋榮益氣止崩湯黃耆白朮人參當歸生地麥冬川芎各一錢陳皮炙草升麻白芷荊芥穗各四分黃連四分如汗多加麻黃根一錢浮麥一撮大便不通加肉蓯蓉一錢禁用大黃如有氣磨木香一錢痰加貝母六分竹瀝薑汁寒嗽加杏仁桔梗知母各一錢驚悸加棗仁柏子仁各一錢傷麵食加麥芽一錢傷米食加神麯一錢傷肉食加山楂砂仁各八分身熱不可用芩連黃柏傷食及怒氣均不可專用耗散無補之方宜上方加減藥引俱用棗煎服産後短氣似喘凡産血脫勞倦之甚氣無倚恃而呼吸止息違其常度世有妄論痰火反用散氣化痰之方誤人夭折多矣夫肺受脾稟運氣生脈通水道順呼吸清肅上下調和榮衛而為平人之常候也值産血氣脫呼吸短言語不相接續似喘危症當大補氣血為主如有塊痛不可加耆朮若無塊痛可用生化湯加熟地二錢附子一片去桃仁如足冷加熟附子一錢黃耆白朮各一錢五分陳皮四分分娩後即患氣短有塊痛加參生化湯川芎二錢當歸四錢炙甘草五分薑炭四分桃仁十粒人參一錢棗二枚服二三帖後加減産後氣短促無塊痛續氣養榮湯黃耆白朮川芎各一錢當歸四錢人參三錢陳皮炙甘草薑炭各四分熟地二錢如足冷加熟附子五分
