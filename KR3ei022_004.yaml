body:
  text: 卷四心痛風寒邪氣痰飲交結而傷心支結則乍寒乍止者是當審其因而治如飲食所傷用平胃散加枳殼山楂火龍散川楝子小茴香炒各三錢艾葉末鹽炒一錢五分水煎服卒然心痛欲死不可忍白朮湯白朮白芍各二兩黃芩一兩五錢分三帖煎服或沉香降氣湯或茯苓補心湯或四七湯或紫蘇飲或延胡為末調服皆可治治臨産卒然心痛歸苓散當歸川芎茯苓各三錢厚朴一錢五分水煎服心腹痛多由風寒濕熱痰飲與臟氣相擊上衝於心則心痛下攻於腹則腹痛攻痛不已則胎動矣宜用金沸草湯若胎氣鬱結加香附川芎如飲食傷滯用六君子湯加紫蘇枳殼如怒氣傷肝加柴胡山梔若鬱結傷脾用歸脾湯加枳殼山梔孕婦腹中不時作痛小腹重墜多由血虛氣陷閒有兼寒熱者單氏加味安胎散人參一錢五分白朮熟地各二錢川芎八分紫蘇當歸甘草陳皮各四分姜引如兼寒加吳茱萸或乾薑五分砂仁一錢五分研末服孕婦腹中絞痛當歸芍藥散芍藥半斤當歸茯苓白朮各四兩澤瀉川芎各二兩共研末每服二兩用姜三片棗一枚煎水送小腹痛此症如因風寒所搏用紫蘇飲加生薑系氣血虛加八珍湯系中氣虛用補中益氣湯如脹痛用安胎飲加升麻白朮服之不應兼服補中益氣湯腰腹背痛風冷乘虛入滯則痛若使腰痛甚則墮胎矣如因外邪所傷用獨活寄生湯因氣血滯郁用紫蘇飲加枳殼因勞傷元氣用八珍湯加杜仲砂仁阿膠艾葉因脾腎陰虛加白朮補骨脂因肝火所傷用小柴胡湯加白朮枳殼山梔因肝脾鬱結用歸脾湯加柴胡枳殼治腰痛不可忍神效通氣散破故紙瓦上焙五錢熟為末胡桃一個空心溫酒嚼下三錢子鳴此症或云兒口含臍帶上疙瘩因母高舉臂脫出故啼令母曲腰就地如拾物狀仍令入兒口即止子鳴散空房鼠窟前後土為細末研麝香一二釐入內酒下二錢又方黃連煎汁呷上二方麝香開竅黃連性寒俱宜酌用積聚岐伯云大積大聚其可犯也衰其大半而止過者死故重身毒之有故無損亦無殞也丹溪曰血塊如盤有難服峻藥者以後方主之香附海粉丸醋煮香附四兩桃仁去皮尖蛤粉醋煮白朮各一兩為末麵糊丸服咳嗽嗽有風寒痰熱虛損氣喘之異咳有心肝脾腎肺之分治當知其因審所屬則咳嗽止而胎自安矣肺咳則喘息有聲甚者唾血肺藏氣而應息故喘息有聲肝絡逆故吐血心咳心痛喉中介介如梗狀甚者咽腫喉痹小腸失氣肝咳則兩脅下痛甚至不可轉轉則兩脅下滿嘔水膽汁脾咳右脅下痛隱隱引肩甚則不可動動則咳劇胃嘔而食蟲出腎咳則腰背引痛甚則咳涎膀胱遺溺三焦腹滿不欲飲食治嗽因風寒寧肺止嗽飲天冬二錢桔梗紫蘇甘草各四分知母一錢杏仁十粒桑皮八分因痰嗽加橘紅四分竹瀝薑汁因熱嗽去杏仁加黃芩八分因虛嗽加紫菀款冬各五分因喘夜嗽加麻黃蜜炙三分虛損嗽加栝蔞一個竹瀝薑汁若心胸不舒加貝母百合各一錢治嗽不止胎不安止嗽紫菀湯杏仁二錢甘草八分紫菀桑皮各二錢桔梗天冬各一錢水煎服治嗽帶血止嗽涼血飲紫菀知母白朮麥冬當歸各一錢陳皮甘草各四分黃芩犀角各八分天冬二錢如喘加栝蔞一錢治肺癰咳嗽喘急苦梗散桔梗紫蘇桑枝貝母人參甘草各五錢天冬赤苓各一兩麻黃二錢五分共研末每服四錢加姜引治胎氣壅滯咳嗽喘急馬兜鈴散馬兜鈴桔梗人參甘草貝母各五錢橘紅大腹皮桑皮紫蘇各二兩五味子二錢共研末每服四錢加姜三片如不嗽而喘當求別治霍亂吐瀉頻腹痛服六和湯次用丹溪安胎飲丹溪安胎飲白朮當歸熟地各二錢川芎條芩各八分人參一錢紫蘇陳皮甘草各四分砂仁三分薑棗引治內傷飲食外感風寒用藿香正氣散若因食滯用平胃散如果系脾胃損傷陽氣虛寒手足厥冷必須溫補然後詳審毋使胎動不語重身九月而喑不必服藥月足當復蓋少陰之脈貫腎絡舌本胞系了戾故不能言泄瀉此症以六君子湯為君如因米飯傷加穀芽麵食傷加麥芽肉食傷加山楂兼寒熱作嘔肝木侮脾土加柴胡生薑兼嘔腹痛手足逆冷乃寒侮土加薑桂如不應再服錢氏益黃散若瀉黃色乃脾土之真色加木香姜桂若瀉在五更清晨飲食少思乃脾腎虛弱五更服四神丸日閒服白朮散如不應或愈而復作飲食少思用八味丸補命門火以生脾土至如元氣下陷發熱作渴肢體倦怠則用補中益氣湯痢痢下黃水乃土色此脾氣下陷當升補中氣兼青黃色乃木剋土泄肝補脾黃兼白此子令母虛宜補脾胃黃兼黑此水侮土必溫補脾胃黃兼赤色當補母益子宜補中益氣至於腸胃虛弱風寒客之須胃風湯或胎不安急補胃自安凡安胎之藥臨病制宜不拘膠艾之類歸芍湯當歸白芍各二錢黃芩八分白朮三錢川芎三錢澤瀉一錢五分水煎服凡胎前痢宜用黃芩黃連白芍炙草橘紅紅曲枳殼蓮肉略用升麻未滿七月勿用滑石如症急必須用者不拘此例瘧疾妊娠患瘧多傷乎胎宜早治若系飲食停滯宜用六君子湯加桔梗蒼朮藿香外邪多而飲食少用藿香正氣散外邪少而飲食多用人參養胃湯勞傷元氣用補中益氣湯鬱怒所傷用小柴胡兼歸脾湯若木旺侮於土久而不愈用六君子湯佐以安胎藥仍參三陽三陰而治之單氏治胎前患瘧方半夏七分草果青皮各五分烏梅一個人參黃芩各一錢白朮當歸各二錢紫蘇甘草各四分藿香五分姜引煩渴心脾二經氣行口舌孕婦臟腑氣虛榮衛不理陰陽隔絶熱乘於心脾津液枯少故令煩躁而口乾也若胃經實火竹葉石膏湯胃經虛熱人參黃耆散胃經氣虛補中益氣湯肺經虛熱紫蘇飲肝經火動加味逍遙散腎經火動加味地黃丸孕婦煩熱兼咽間作痛用知母散加山梔知母散黃耆赤茯苓子芩各七錢五分門冬知母甘草各五錢共研末每服四錢竹瀝引熱病孕婦口乾不得臥用丹溪安胎飲加麥冬甘葛壅熱心神煩躁口乾渴參芩犀角湯人參知母麥冬梔子仁各一錢甘草條芩各五分栝蔞根犀角各八分如夏令加竹瀝五匙薑汁二匙沖服熱病嘔吐不食胸中煩躁蘆根湯蘆根葛根各一錢五分人參麥冬知母各一錢竹茹一丸梔子一錢蔥白三寸斑出赤黑色小便如血氣急欲絶此胎落矣青黛豆豉湯梔子黃芩升麻各一錢青黛七分淡豆豉四十九粒生地二錢杏仁十粒石膏一錢五分蔥白七寸熱病骨節疼痛不急治則胎落葛根湯葛根石膏各二錢升麻三分前胡八分青黛八分如有痰加竹瀝薑汁胎蒸面腫赤色口苦咽乾日晡寒熱日漸羸瘦胎氣不見升動用銀柴胡胡黃連各一錢煎服治從氣血虛加味治胎不轉動芎歸蘇苓湯當歸二錢川芎枳殼茯苓砂仁各一錢蘇葉五分吐衄凡憂思驚怒傷其臟腑氣升於上血隨而溢心悶胸滿久而不已至墮胎則不治矣若系肝經怒火先用小柴胡湯加山梔生地次用前藥合四物湯後用加味逍遙散系肝經風熱用防風子芩丸繫心經有熱用硃砂安神丸繫心氣不足用補心湯系思慮傷心用妙香散系胃經有火犀角地黃湯系膏粱積熱加味清胃散系鬱結傷脾用加味歸脾湯系肺經有火黃芩清肺飲系子氣不攝血補中益氣湯系腎經虛火加味六味丸加味逍遙散當歸芍藥各二錢黃芩八分白朮柴胡甘草各一錢薄荷加山梔各四分丹皮六分防風子芩丸條芩炒焦防風等分為末酒糊丸米飲下或溫酒亦可硃砂安神丸黃連酒炒六分硃砂五錢炙甘草五分生地當歸各三錢五分為末糊丸每服十五丸補心湯人參茯苓各二錢甘草一錢桂心五分麥冬二錢紫石英煅赤小豆各一錢大棗七枚妙香散甘草二錢遠志山藥茯苓茯神黃耆各一兩人參桔梗各五錢五分辰砂三錢麝香二錢木香二錢五分為末溫酒下二錢犀角地黃湯犀角八分丹皮一錢五分生地白芍各二錢加味清胃散升麻四分黃連三分丹皮五分生地當歸各二錢加味歸脾湯人參白朮茯神黃耆棗仁各一錢五分炙甘草木香各五分當歸遠志各一錢龍眼肉二錢五分加丹皮山梔各一錢薑棗引清肺飲五味黃耆各二錢歸身麥冬生地人參各一錢治男婦諸血逆上必勝散熟地小薊並根用人參蒲黃炒川芎當歸各五錢烏梅肉五錢煎不拘時服治吐衄或破傷失血驀患口噤項強背直類中風症此皆由失血而然單氏吐衄方人參當歸白朮各二錢生地條芩天麻各二錢陳皮防風荊芥各四分麥冬一錢爽期婦人懷胎有七月八月而似欲生者宜涼血安胎有過一年二年數年而不生者宜補血行氣治月分未足痛甚欲産知母丸兼治難産子煩知母為末蜜丸溫酒下或米飲亦可每服二十丸日三服槐子丸槐子蒲黃等分為末蜜丸溫酒下二十丸以痛止為度又方梁上塵灶突煤同為末空心溫酒下二三錢吳按灶突煤即百草霜燒草者佳治過期不産加味四物湯川芎當歸熟地白芍各二錢香附錢半桃仁枳殼各七分縮砂紫蘇各一錢
