body:
  text: 卷一安胎論凡孕婦脾胃旺氣血充足則胎安產正子亦多壽何用安胎若氣血衰脾胃弱而飲食少則虛症百出或孕成數墜而子不壽是必資藥力以助母胎並壽子也夫精血會凝而成孕精氣蒸胃而遂嘔血少肝虛加愛醋物胃氣受傷厭阻飲食若人素弱嘔阻橘半量加稟孕而然竹瀝薑汁胎痛宜緩少加帶殼砂仁胎漏宜涼須用地黃生熟至若傾撲動胎下血膠艾宜加怒氣胎遂上衝木香為使小便短澀成淋瀝安榮不應用升提若還滯血流於脬逍遙梔子宜加入子腫面目虛浮而肢體水氣全生白朮堪醫子煩心驚膽怯而時見悶煩竹葉安胎可療天仙藤治子氣腳縫水出人虛多用術參羚羊角理子癇項強筋搐應用人參竹瀝脾氣虛而胎壓尿胞則臍腹痛而小便淋閉安胎飲雖宜法當升提探吐脾氣弱而轉運淹遲則飲食停而胃家脹嘔安胎飲力緩加參平胃調和又若胸滿腹脹便閉遍身浮腫鯉魚湯治胎水攸宜恐脾胃氣虛四君五皮為佐胎氣上攻心腹脹痛紫蘇飲療子懸甚當若食少晡熱逍遙加味相兼柴前梅連為丸骨蒸勞熱可退當歸六黃作引盜汗晡熱堪除孕成屢墮因母血弱不能分蔭其胎娩子無氣由母氣虛僅可滋榮於己老夫得其少婦須寡欲以候經期壯陽若遇衰陰必宜頻藥以全胎力參朮條芩為安胎之聖藥芎歸懷熟實補血之良規佐以蘇葉陳皮可為常服之方孕成六月之前其胎尚未轉運茯苓性降不宜多用黃耆肥胎豈可常加香附雖胎喘宜加久服虛人有害砂仁可止嘔定痛多用動血行胎歷考丹溪之論不過數言安胎之方止於三四若能加減治病可以十全八九矣辨胎歌肝為血兮肺為氣血為榮兮氣為衛榮衛和諧胎必成血衰氣盛未有體寸微關滑尺帶數流利往來如雀啄孕婦之脈已見形數月懷耽休認錯三部浮沉平正等尺按不絕胎其確無止方是滑而且散三月胎散者心脈三月心胞養胎故爾但滑不散五月母經云婦人手少陰脈動甚者妊也動如豆厥厥動搖也心主血胎成則血聚護胎故心脈動或亦有不動而是胎者乃作足少陰非也蓋動者壯婦血盛也不動者弱婦血少也陰搏陽別謂之有子左陰右陽尺陰寸陽沉陰浮陽搏者淤觸於手也胎必熱故脈搏陰者胎之所居也婦人時時衄血而轉筋者軀衄時嚏而動者非軀婦人寸口脈衝浮而大榮反弱浮大氣強反弱血少孤陽獨呼陰不能吸二氣不停衛強榮弱積為陰寒陽為聚熱陽盛不潤經絡不足陰虛陽旺故令少血時發喘淅咽燥汗出或溲稠數多吐涎沫乃是重虛津液漏泄經血三月不來名曰居經非軀也諸陽為男諸陰女左右分明肺腎取左盛男右盛女左右俱盛一男一女左手帶縱兩個兒右手帶橫一雙女夫乘妻為縱妻乘夫為橫左手脈逆生三男右手脈盛生三女子乘母為逆氣母乘子為順氣又男胎居左女胎居右胎之所居氣血聚焉其脈滑利而盛故左盛則男右盛則女嘗觀癰癤發上則寸脈盛發下則尺脈盛發左則左脈盛發右則右脈盛此所以悟胎居之理也驗胎散真雀腦芎一兩當歸全用七錢為細末作兩股濃煎膠湯一盞酒調服服後二三時覺臍腹作動此有胎也動罷即愈安穩無虞如不是胎不動所滯惡物自行如一服不覺再煎紅花湯調下一服必效探胎散皂角去皮炙甘草各一錢黃連五分為末溫酒調服有胎則吐無胎不吐一法經水三月不行用川芎三錢為末煎艾湯調服服後一時腹內微動非胎不動大約尺脈調而不月水者孕也如經閉脈必不正或不至養胎婦人童幼天癸未行之先屬少陰天癸既行屬厥陰天癸既絕屬太陰或妊娠養胎始於厥陰者是祖氣生化之原也陰陽配合故次及少陽膽經五行相生正是肝膽之木次及胞絡三焦之火歷脾腎肺大腸胃膀胱而終十月之期焉惟手少陰太陽二經無專養者君主之官無為而已一月肝足厥陰經二月膽足少陽經三月胞絡手厥陰經四月三焦手少陽經五月脾足太陰經六月胃足陽明經七月肺手太陰經八月大腸手陽明經九月腎足少陰經十月膀胱足太陽經按回回國譯天文書七曜相照所屬與前不同今並載以備參考初時胎宮極熱將外膚蒸乾後為胞衣一月土星照二月木星照色變紅三月火星照心肝腦成四月太陽照身體全成五月金星照毛髮成六月水星照舌動口開七月太陰照此月胎中有力若是月生養得長成八月又土星照土星性燥胎氣動兒昏沉是月生養不長成九月又水星照熱潤有力轉動十月既足氣全力生安胎安胎之法以養血氣理脾胃為主白朮益脾以培萬物之母條芩固中瀉火氣能滋子戶之陰使火不妄動所以為安胎聖藥砂仁安胎以其止痛行氣故耳勞神動怒情欲之火俱能墮胎推原其本皆因於熱火能消物造化自然古方謂風冷傷於子宮而墮未達病情者也如慣墮胎之婦或中氣不調食少且不必養血先理脾胃次服補中益氣湯使氣血自生因母病而動胎者但治母病其胎自安因胎病而致母病者但安胎則母病自愈胎多在三月分而墮者爾時手厥陰心胞絡主養胎元勞心多慮心胞絡虛不能養胎則墮治宜兼制火用四物湯加黃柏元參白朮條芩左脈微弱身痛夜熱腰痛胎不安屬血虛用四物湯加杜仲黃芩白朮秦艽右脈寸關大而無力似滑且不流利倦怠懶於言動屬氣虛用補中益氣湯加山藥杜仲條芩兩手脈俱弱胎常墜屬氣血兩虛用八珍湯加山梔杜仲續斷條芩白朮孕婦忽然下黃汁如膠或如豆汁胎動腹痛是氣虛也用佛手散加黃耆糯米濃煎汁服如腹不痛單用耆糯米佛手散方見秘要孕婦下赤汁屬血虛有火正方用子芩當歸川芎煎服若奇兵則用銀苧酒銀苧酒苧根去黑皮研碎五錢白銀一兩以水酒各半煎服治胎動不安一法取苧根如足趾大者一尺煎服即愈丹溪云以苧根能補血行滯也懷胎宜養血益氣健脾清火當常服固胎飲固胎飲川芎一錢當歸白芍熟地各二錢人參白朮陳皮甘草各一錢少佐黃連黃柏桑上羊兒藤要七葉完全者糯米一錢如見血不安加阿膠痛而氣滯加縮砂仁胎至七月後宜服方束胎丸黃芩酒炒夏月一兩秋七錢冬五錢茯苓七錢五分白朮二兩陳皮三兩為末粥丸每服錢五分胎至臨月服束胎散易產束胎散即達生散人參陳皮各五分白朮白芍全當歸各一錢炙甘草二分蘇葉五分大腹皮二錢難產之婦多氣血虛弱榮衛澀滯使然是方用人參白朮甘草以益氣當歸芍藥以益血紫蘇腹皮陳皮以疏滯氣則其生易矣如腹脹或痛加砂仁枳殼青蔥五葉黃楊腦七個有火加黃芩頭目眩悶加川芎如氣虛倍參術氣實加香附倍陳皮血虛倍當歸加地黃形實倍紫蘇性急加黃連熱極加黃芩濕痰加海石半夏食積加山楂食後易飢加黃楊腦腹痛加木香官桂黃芩冬月不可用桂臨產當服補血順氣藥使胎易產保生無憂散兼治小產瘀血腹痛南木香當歸川芎白芍枳殼乳香血餘即頭髮洗淨煅灰各等分水煎日二服均用五分小產半產多在三個月及五七月除跌撲損傷外若前次懷胎三個月而墮者下次有孕如期復然蓋先於此時受傷故後期必應乘其虛也必須預服健脾益氣養榮藥於一有孕之日日日不可缺乃可胎元不足倦怠或胎動不安或身微熱減食單氏安胎散人參當歸懷熟地各二錢白朮二錢五分條芩八分陳皮蘇葉各四分砂仁三分如煩渴加麥冬一錢棗五枚水煎服如腰疼脾腿痛必一日夜服三帖可安嘔吐痰水心煩悶頭重目眩惡聞食氣胎動腰腹痛下血等症用四物湯加黃耆白朮甘草黃芩阿膠人參桑寄生如無真寄生以續斷代之
