body:
  text: 女科後序余岳丈陳貞甫太守乃閩中修園先生後裔素以醫名自幼受其指教粗得皮毛但醫書汗牛充棟惟擇其最善者而從之嘗考岐黃治病專精針灸伊尹始傳湯液漢自仲景後初分門類而婦幼乃有專科然皆醫國壽民存心利濟非如近世射利之徒私秘良方行同市儈所以人多輕視而醫學埽地矣光緒乙酉冬吳君幼筠以家藏竹林寺婦科秘本擬將鋟板以廣流傳由翁君式如見示屬為校訂詳細讀之胎產諸症備舉無遺其方亦屬王道並非離奇但非一手所著不敢斷鶴續鳧強為連貫況抄本訛誤句讀難明湯丸顛倒分兩參差所關非細千里毫釐因稍加修飾補短截長酌添分兩配合君臣庶秘方可稱全璧苟居家者既獲此書再益以達生福幼等編則窮僻之鄉審症用藥較以性命付諸庸醫之手得失奚如吾知書成後胎前諳治法產後多良方久秘之本竟得廣傳豈非生民之慶幸也哉校竣序其緣起而歸之光緒丙戌年春正月仁和禮堂曹秉綱序於鄂匏齋
